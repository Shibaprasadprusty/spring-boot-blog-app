<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Create Post</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body>

	<div class="container mt-5">

		<div class="row justify-content-center">

			<div class="col-md-10">

				<div class="card">

					<div class="card-header text-center">

						<h2>Create Post</h2>

					</div>

					<div class="card-body">
					
					 <p class="text-success"
	                    th:text="${successMsg}">
	                 </p>

						<form th:action="@{/savePost}"
							  th:object="${post}"
							  method="post">

							<div class="mb-3">

								<label>Title</label>

								<input type="text"
									   th:field="*{title}"
									   class="form-control"
									   placeholder="Enter post title">

							</div>

							<div class="mb-3">

								<label>Short Description</label>

								<textarea th:field="*{description}"
										  class="form-control"
										  rows="3"
										  placeholder="Enter short description">
								</textarea>

							</div>

							<div class="mb-3">

								<label>Content</label>

								<textarea th:field="*{content}"
										  class="form-control"
										  rows="10"
										  placeholder="Enter post content">
								</textarea>

							</div>

							<button type="submit"
									class="btn btn-primary">

								Submit

							</button>

						</form>

					</div>

				</div>

			</div>

		</div>

	</div>

</body>

</html>
