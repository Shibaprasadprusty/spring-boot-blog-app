<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Registration Page</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body>

	<div class="container mt-5">

		<div class="row justify-content-center">

			<div class="col-md-8">

				<div class="card">

					<div class="card-header text-center">

						<h2>Registration</h2>

					</div>

					<div class="card-body">
					
						<p class="text-success"
	                     th:text="${successMsg}">
	                     </p>
					

						<form th:action="@{/saveUser}"
							  th:object="${user}"
							  method="post">

							<div class="mb-3">

								<label>First Name</label>

								<input type="text"
									   th:field="*{fname}"
									   class="form-control"
									   placeholder="Enter first name">

							</div>

							<div class="mb-3">

								<label>Last Name</label>

								<input type="text"
									   th:field="*{lname}"
									   class="form-control"
									   placeholder="Enter last name">

							</div>

							<div class="mb-3">

								<label>Email</label>

								<input type="email"
									   th:field="*{email}"
									   class="form-control"
									   placeholder="Enter email">

							</div>

							<div class="mb-3">

								<label>Password</label>

								<input type="password"
									   th:field="*{pwd}"
									   class="form-control"
									   placeholder="Enter password">

							</div>

							<button type="submit"
									class="btn btn-primary">

								Register

							</button>
							
							

						</form>

					</div>

				</div>

			</div>

		</div>

	</div>

</body>

</html>
