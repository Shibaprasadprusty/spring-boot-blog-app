<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Edit Post</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body>

	<div class="container mt-5">

		<div class="card">

			<div class="card-header text-center">

				<h2>Edit Blog Post</h2>

			</div>

			<div class="card-body">

				<form th:action="@{/updatePost}"
					  th:object="${post}"
					  method="post">

					<input type="hidden"
						   th:field="*{postId}">
                 
                  <input type="hidden"
                        th:field="*{createdOn}">



					<div class="mb-3">

						<label>Title</label>

						<input type="text"
							   th:field="*{title}"
							   class="form-control">

					</div>

					<div class="mb-3">

						<label>Description</label>

						<textarea th:field="*{description}"
								  class="form-control"
								  rows="3">
						</textarea>

					</div>

					<div class="mb-3">

						<label>Content</label>

						<textarea th:field="*{content}"
								  class="form-control"
								  rows="10">
						</textarea>

					</div>

					<button type="submit"
							class="btn btn-success">

						Update Post

					</button>

				</form>

			</div>

		</div>

	</div>

</body>

</html>
