<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Login Page</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body>

	<div class="container mt-5">

		<div class="row justify-content-center">

			<div class="col-md-8">

				<div class="card">

					<div class="card-header text-center">

						<h2>Login Form</h2>

					</div>

					<div class="card-body">
					
					<p class="text-danger"
	                  th:text="${errorMsg}">
	                </p>

						<form th:action="@{/login}"
							  method="post">

							<div class="mb-3">

								<label>Email</label>

								<input type="email"
									   name="email"
									   class="form-control"
									   placeholder="Enter email">

							</div>

							<div class="mb-3">

								<label>Password</label>

								<input type="password"
									   name="pwd"
									   class="form-control"
									   placeholder="Enter password">

							</div>

							<button type="submit"
									class="btn btn-primary">

								Login

							</button>

						</form>

					</div>

				</div>

			</div>

		</div>

	</div>

</body>

</html>
