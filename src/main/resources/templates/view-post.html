<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>View Post</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body>

	<div class="container mt-5">

		<div class="card">

			<div class="card-body">

				<h1 th:text="${post.title}"></h1>

				<hr>

				<h5 class="text-secondary"
					th:text="${post.description}">
				</h5>

				<p class="mt-3"
				   th:text="${post.content}">
				</p>

				<hr>

				<p>

					<b>Created On :</b>

					<span th:text="${post.createdOn}"></span>

				</p>

				<hr>

				<h3>Comments</h3>

				<div th:each="comment : ${post.comments}">

					<div class="border p-3 mb-3">

						<h5 th:text="${comment.name}"></h5>

						<p th:text="${comment.content}"></p>

						<small th:text="${comment.createtedOn}">
						</small>

					</div>

				</div>

				<hr>

				<h3>Leave a Comment</h3>

				<form th:action="@{/saveComment}"
					  th:object="${comment}"
					  method="post">

					<input type="hidden"
						   name="postId"
						   th:value="${post.postId}">

					<div class="mb-3">

						<label>Name</label>

						<input type="text"
							   th:field="*{name}"
							   class="form-control">

					</div>

					<div class="mb-3">

						<label>Email</label>

						<input type="email"
							   th:field="*{email}"
							   class="form-control">

					</div>

					<div class="mb-3">

						<label>Comment</label>

						<textarea th:field="*{content}"
								  class="form-control"
								  rows="5">
						</textarea>

					</div>

					<button type="submit"
							class="btn btn-primary">

						Submit

					</button>

				</form>

				<br>

				<a href="/dashboard"
				   class="btn btn-secondary">

					Back

				</a>

			</div>

		</div>

	</div>

</body>

</html>
